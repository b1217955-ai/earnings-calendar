name: Codex Context 自動更新

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/update_codex_context.py
      - sector_ranking/**
      - .github/workflows/**

jobs:
  update-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: CODEX_CONTEXT.md を再生成
        run: python3 scripts/update_codex_context.py

      - name: 変更をコミット・プッシュ
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add CODEX_CONTEXT.md
          git diff --staged --quiet || git commit -m "Update Codex context"
          git push
